<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>VLTRVIEW — Utility Locator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --green:#00e000;--green-dk:#006600;
  --orange:#ff6633;--blue:#378ADD;--amber:#BA7517;
  --red:#E24B4A;--red-dk:#791F1F;--sewer:#639922;
  --topbar:#2a2a2a;--fab:rgba(68,68,74,.92);
  --text1:#111;--text2:#555;--text3:#999;--border:#e0ddd6;
}
html,body{height:100%;width:100%;background:#1a1a1a;font-family:'DM Sans',sans-serif;overflow:hidden;}
#app{width:100%;height:100%;display:flex;flex-direction:column;background:#000;}

/* ── Top bar ── */
#topbar{height:52px;background:var(--topbar);display:flex;align-items:center;padding:0 10px;gap:2px;flex-shrink:0;border-bottom:1px solid #3a3a3a;}
#topbar .co{font-size:17px;color:#fff;font-weight:400;flex:1;padding-left:6px;letter-spacing:.1px;}
.ti{width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:50%;border:none;background:none;transition:background .15s;}
.ti:hover{background:rgba(255,255,255,.1);}
.ti svg{width:23px;height:23px;}

/* ── Main area ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;padding-bottom:56px;}

/* ── Map ── */
#mapwrap{position:relative;overflow:hidden;background:#ebe8e0;transition:height .3s cubic-bezier(.4,0,.2,1);height:100%;}
#mapwrap.sv-open{height:42%;}
#mapsvg{width:100%;height:100%;}

/* ── Street View panel ── */
#svpanel{position:relative;overflow:hidden;background:#1a1a1a;height:0;transition:height .3s cubic-bezier(.4,0,.2,1);flex-shrink:0;}
#svpanel.open{height:58%;}
#svcanvas{width:100%;height:100%;display:block;}
#sv-overlays{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.sv-util-label{position:absolute;display:flex;flex-direction:column;align-items:center;gap:2px;pointer-events:none;}
.sv-label-pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;color:#fff;white-space:nowrap;font-family:'JetBrains Mono',monospace;letter-spacing:.2px;}
.sv-depth{font-size:9px;color:rgba(255,255,255,.7);background:rgba(0,0,0,.5);padding:1px 5px;border-radius:10px;}
.sv-struct{position:absolute;width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;font-family:'JetBrains Mono',monospace;}
#sv-topbar{position:absolute;top:0;left:0;right:0;height:38px;background:linear-gradient(to bottom,rgba(0,0,0,.72),transparent);display:flex;align-items:center;padding:0 14px;gap:10px;z-index:10;}
#sv-heading{font-size:12px;color:#fff;font-family:'JetBrains Mono',monospace;}
#sv-addr{font-size:12px;color:rgba(255,255,255,.75);flex:1;}
#sv-close{background:rgba(0,0,0,.4);border:none;color:#fff;font-size:16px;cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
#sv-controls{position:absolute;bottom:0;left:0;right:0;height:54px;background:linear-gradient(to top,rgba(0,0,0,.75),transparent);display:flex;align-items:center;justify-content:center;gap:18px;z-index:10;}
.sv-btn{width:46px;height:46px;border-radius:50%;background:rgba(28,28,28,.88);border:1.5px solid rgba(255,255,255,.18);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;backdrop-filter:blur(4px);}
.sv-btn:hover{background:rgba(60,60,60,.95);}
.sv-btn:active{transform:scale(.92);}
#sv-pos-label{font-size:11px;color:rgba(255,255,255,.8);font-family:'JetBrains Mono',monospace;min-width:80px;text-align:center;}

/* ── FABs ── */
#sv-fab{position:absolute;bottom:14px;right:14px;width:48px;height:48px;border-radius:50%;background:var(--fab);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.45);z-index:20;transition:background .15s;}
#sv-fab:hover{background:rgba(88,88,98,.98);}
#sv-fab svg{width:23px;height:23px;fill:none;stroke:#ddd;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
#sv-fab.active{background:rgba(55,138,221,.85);}
#layer-fab{position:absolute;bottom:70px;right:14px;width:48px;height:48px;border-radius:50%;background:var(--fab);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.45);z-index:20;}
#layer-fab svg{width:23px;height:23px;fill:none;stroke:#ddd;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── GPS chip ── */
/* ── Current location tab ── */
#loc-tab{background:#1c1c1e;overflow:hidden;max-height:0;transition:max-height .3s cubic-bezier(.4,0,.2,1);flex-shrink:0;}
#loc-tab.open{max-height:220px;}
#loc-tab-handle{width:36px;height:3px;background:#444;border-radius:2px;margin:8px auto 4px;}
#loc-tab-inner{padding:0 16px 14px;}
#loc-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
#loc-status-dot{width:9px;height:9px;border-radius:50%;background:#4CAF50;flex-shrink:0;box-shadow:0 0 0 3px rgba(76,175,80,.2);}
#loc-title{font-size:13px;font-weight:600;color:#fff;line-height:1.2;}
#loc-accuracy{font-size:10px;color:#4CAF50;font-family:'JetBrains Mono',monospace;margin-top:1px;}
#loc-recenter{margin-left:auto;display:flex;align-items:center;gap:5px;padding:5px 10px;background:rgba(76,175,80,.15);border:1px solid rgba(76,175,80,.35);border-radius:20px;color:#4CAF50;font-size:11px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;}
#loc-recenter:hover{background:rgba(76,175,80,.25);}
#loc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px;}
.loc-cell{background:#2a2a2e;border-radius:8px;padding:7px 9px;}
.lc-label{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.lc-val{font-size:12px;font-weight:500;color:#ddd;font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#lc-compass{font-size:12px;color:#EF9F27;}
#loc-bar{height:3px;background:#2a2a2e;border-radius:2px;overflow:hidden;margin-bottom:4px;}
#loc-bar-fill{height:100%;background:#4CAF50;border-radius:2px;transition:width .4s ease;width:16.6%;}
#loc-bar-label{font-size:10px;color:#555;font-family:'JetBrains Mono',monospace;}
#loc-btn.active{background:rgba(76,175,80,.15);}
#gps-chip{display:none;}

/* ── Fault banner ── */
#faultbar{position:absolute;top:0;left:0;right:0;background:rgba(158,38,38,.93);padding:8px 16px;display:none;align-items:center;gap:10px;z-index:30;}
#faultbar span{font-size:12px;color:#fff;flex:1;}
#faultbar button{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:11px;padding:4px 12px;border-radius:20px;cursor:pointer;}

/* ── Bottom sheet ── */
#sheet{position:absolute;bottom:0;left:0;right:0;background:#f9f8f6;border-radius:22px 22px 0 0;transform:translateY(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);max-height:60%;display:flex;flex-direction:column;box-shadow:0 -4px 28px rgba(0,0,0,.22);z-index:50;}
#sheet.open{transform:translateY(0);}
.sh-handle{width:40px;height:4px;background:#ccc;border-radius:2px;margin:12px auto 0;}
.sh-head{padding:10px 18px 0;display:flex;align-items:flex-start;justify-content:space-between;}
.sh-title{font-size:15px;font-weight:600;color:var(--text1);flex:1;line-height:1.3;}
.sh-close{background:none;border:none;font-size:24px;color:#bbb;cursor:pointer;}
.sh-sub{font-size:11px;color:var(--text2);padding:2px 18px 8px;}
.sh-rows{overflow-y:auto;flex:1;padding-bottom:8px;}
.sh-row{display:flex;justify-content:space-between;align-items:center;padding:8px 18px;border-top:.5px solid var(--border);}
.sh-k{font-size:12px;color:var(--text2);}
.sh-v{font-size:12px;font-weight:500;color:var(--text1);text-align:right;max-width:58%;}
.sh-actions{display:flex;gap:8px;padding:10px 18px 16px;border-top:.5px solid var(--border);}
.sh-btn{flex:1;padding:11px;border-radius:12px;border:none;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
.sh-btn.pri{background:#2a2a2a;color:#fff;}
.sh-btn.red{background:#FCEBEB;color:#A32D2D;}
.sh-btn.blu{background:#e8f4ff;color:#185FA5;}
.cond{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;}
.cg{background:#e8f5e9;color:#27A045;}.cf{background:#fff3e0;color:#E67E00;}.cp{background:#FCEBEB;color:#C0392B;}.cu{background:#e8f0ff;color:#185FA5;}
.imp-section{padding:8px 18px;}
.imp-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.imp-item{display:flex;align-items:center;gap:7px;padding:4px 0;font-size:11px;color:var(--text2);border-bottom:.5px solid var(--border);}
.imp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── Layer panel ── */
#lpanel{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:60;display:none;align-items:flex-end;}
#lpanel.open{display:flex;}
#linner{background:#1c1c1e;width:100%;border-radius:22px 22px 0 0;padding:20px 16px 28px;max-height:82%;overflow-y:auto;}
.lp-handle{width:38px;height:4px;background:#555;border-radius:2px;margin:0 auto 18px;}
.lp-title{font-size:15px;font-weight:600;color:#fff;margin-bottom:6px;letter-spacing:.1px;}
.lp-subtitle{font-size:12px;color:#888;margin-bottom:18px;}
.lp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.util-tile{position:relative;border-radius:16px;padding:14px 10px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;border:2px solid transparent;transition:all .18s cubic-bezier(.4,0,.2,1);background:#2a2a2e;user-select:none;}
.util-tile.on{border-color:rgba(255,255,255,.18);}
.util-tile.off{opacity:.42;filter:saturate(0.2);}
.util-tile:active{transform:scale(.94);}
.ut-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;}
.ut-label{font-size:11px;font-weight:600;color:#fff;text-align:center;letter-spacing:.2px;line-height:1.2;}
.ut-sub{font-size:9px;color:#888;text-align:center;letter-spacing:.1px;}
.ut-badge{position:absolute;top:8px;right:8px;width:10px;height:10px;border-radius:50%;background:#4CAF50;border:1.5px solid #1c1c1e;transition:background .2s;}
.util-tile.off .ut-badge{background:#555;}
.lp-divider{height:1px;background:#333;margin:14px 0;}
.lp-close{width:100%;margin-top:4px;padding:14px;border-radius:14px;border:none;background:#2a2a2e;color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;}
.lp-close:hover{background:#333;}
.lp-section-label{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;padding-left:2px;}

/* ── Search overlay ── */
#search-overlay{position:absolute;top:0;left:0;right:0;z-index:80;display:none;flex-direction:column;background:var(--topbar);border-bottom:1px solid #444;box-shadow:0 4px 20px rgba(0,0,0,.35);}
#search-overlay.open{display:flex;}
#search-row{display:flex;align-items:center;gap:8px;padding:10px 14px;}
#search-input{flex:1;height:40px;background:#3a3a3a;border:1.5px solid #555;border-radius:10px;padding:0 14px;font-size:15px;color:#fff;outline:none;font-family:'DM Sans',sans-serif;transition:border-color .15s;}
#search-input:focus{border-color:#4CAF50;}
#search-input::placeholder{color:#888;}
#search-cancel{background:none;border:none;color:#aaa;font-size:14px;cursor:pointer;padding:0 4px;white-space:nowrap;font-family:'DM Sans',sans-serif;}
#search-cancel:hover{color:#fff;}
#search-results{max-height:260px;overflow-y:auto;border-top:1px solid #3a3a3a;}
.sr-item{display:flex;flex-direction:column;gap:2px;padding:11px 16px;cursor:pointer;border-bottom:.5px solid #3a3a3a;transition:background .12s;}
.sr-item:hover{background:#333;}
.sr-item:last-child{border-bottom:none;}
.sr-main{font-size:13px;color:#fff;font-weight:500;line-height:1.3;}
.sr-sub{font-size:11px;color:#888;line-height:1.3;}
@keyframes pin-drop{0%{transform:translateY(-20px);opacity:0}60%{transform:translateY(4px)}100%{transform:translateY(0);opacity:1}}
#search-pin{animation:pin-drop .35s ease-out;}
.sr-icon{width:28px;height:28px;border-radius:50%;background:#2a5c2a;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.sr-icon svg{width:14px;height:14px;fill:none;stroke:#4CAF50;stroke-width:2;stroke-linecap:round;}
.sr-name{font-size:13px;color:#eee;font-weight:500;line-height:1.3;}
.sr-addr{font-size:11px;color:#888;margin-top:2px;line-height:1.4;}
.sr-empty{padding:18px 16px;font-size:13px;color:#888;text-align:center;}
.sr-loading{padding:14px 16px;font-size:13px;color:#888;display:flex;align-items:center;gap:8px;}
.sr-spinner{width:14px;height:14px;border:2px solid #555;border-top-color:#4CAF50;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
#search-pin{display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
/* Map pin for searched location */
#located-pin{transition:opacity .3s;}
@keyframes pin-drop{0%{transform:translateY(-20px);opacity:0}60%{transform:translateY(4px)}100%{transform:translateY(0);opacity:1}}
.pin-drop{animation:pin-drop .4s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes dash-march{to{stroke-dashoffset:-16;}}
@keyframes flow-anim{to{stroke-dashoffset:-20;}}
@keyframes fault-blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes shutter-flash{0%{opacity:.7}100%{opacity:0}}
@keyframes menu-in{from{opacity:0;transform:translateY(-8px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ── Tools dropdown ── */
#tools-menu.open{display:block;}
.tm-title{font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.08em;margin:0 6px 8px;}
.tm-item{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:10px;cursor:pointer;transition:background .14s;}
.tm-item:hover,.tm-item.active-tool{background:#2a2a2e;}
.tm-item.active-tool .tm-name{color:#4CAF50;}
.tm-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tm-text{flex:1;}
.tm-name{font-size:13px;font-weight:500;color:#ddd;line-height:1.2;}
.tm-sub{font-size:11px;color:#666;line-height:1.2;margin-top:1px;}
.tm-badge{width:8px;height:8px;border-radius:50%;background:#4CAF50;display:none;flex-shrink:0;}
.tm-item.active-tool .tm-badge{display:block;}

/* ── Tool panels ── */
.tool-panel{position:fixed;top:56px;left:14px;width:260px;background:#1c1c1e;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.55);z-index:190;display:none;animation:menu-in .18s ease-out;overflow:hidden;}
.tool-panel.open{display:block;}
.tp-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;border-bottom:1px solid #2a2a2e;}
.tp-title{font-size:13px;font-weight:600;color:#fff;}
.tp-close{background:none;border:none;color:#666;font-size:20px;cursor:pointer;line-height:1;padding:0;}
.tp-close:hover{color:#fff;}
.tp-body{padding:12px 14px 14px;}
.tp-hint{font-size:12px;color:#777;line-height:1.5;background:#2a2a2e;border-radius:8px;padding:8px 10px;}
.tp-action{width:100%;padding:9px;border-radius:10px;border:none;background:#2a2a2e;color:#ccc;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px;transition:background .14s;}
.tp-action:hover{background:#333;}

/* Measure */
.measure-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:.5px solid #2a2a2e;font-size:12px;}
.mr-label{color:#666;}
.mr-val{color:#ccc;font-family:'JetBrains Mono',monospace;font-size:11px;}
.measure-big{font-size:28px;font-weight:600;color:#4CAF50;text-align:center;padding:10px 0 4px;font-family:'JetBrains Mono',monospace;}
.measure-units{display:flex;gap:6px;justify-content:center;}
.mu-btn{padding:4px 12px;border-radius:20px;border:1px solid #444;background:none;color:#888;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .14s;}
.mu-btn.active{background:#378ADD;border-color:#378ADD;color:#fff;}

/* Draw */
.draw-tools{display:flex;gap:6px;margin-bottom:10px;}
.dt-btn{width:38px;height:38px;border-radius:10px;border:1.5px solid #444;background:#2a2a2e;color:#888;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .14s;}
.dt-btn:hover{border-color:#666;color:#ccc;}
.dt-btn.active{border-color:#00e000;color:#00e000;background:rgba(0,224,0,.08);}
.draw-colors{display:flex;gap:8px;margin-bottom:10px;}
.dc-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;transition:transform .14s;border:2px solid transparent;}
.dc-dot:hover{transform:scale(1.15);}
.dc-dot.active{border-color:#fff;transform:scale(1.1);}

/* Legend */
.leg-section{font-size:10px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;padding-top:2px;}
.leg-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:.5px solid #2a2a2e;}
.leg-line{width:22px;height:3px;border-radius:1px;flex-shrink:0;}
.leg-lbl{font-size:11px;color:#bbb;line-height:1.3;}

/* Search utility */
.utype-filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.utf-btn{padding:4px 10px;border-radius:20px;border:1px solid #444;background:#2a2a2e;color:#888;font-size:11px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .14s;}
.utf-btn:hover{border-color:#666;color:#ccc;}
.utf-btn.active{background:#E24B4A;border-color:#E24B4A;color:#fff;}
.ur-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:.5px solid #2a2a2e;cursor:pointer;}
.ur-item:hover .ur-name{color:#fff;}
.ur-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ur-name{font-size:12px;color:#ccc;flex:1;}
.ur-id{font-size:10px;color:#555;font-family:'JetBrains Mono',monospace;}
.ur-cond{font-size:10px;padding:1px 6px;border-radius:10px;}

/* Measure line on map */
#measure-line{pointer-events:none;}
#measure-dot-a,#measure-dot-b{pointer-events:none;}

/* ── Map style dropdown ── */
#map-menu{position:fixed;top:52px;right:8px;width:292px;background:#1c1c1e;border-radius:16px;padding:14px;box-shadow:0 8px 32px rgba(0,0,0,.55);z-index:200;display:none;animation:menu-in .18s ease-out;}
#map-menu.open{display:block;}
/* ── Tools dropdown ── */
#tools-menu{position:fixed;top:52px;right:56px;width:248px;background:#1c1c1e;border-radius:16px;padding:10px 8px;box-shadow:0 8px 32px rgba(0,0,0,.55);z-index:200;display:none;animation:menu-in .18s ease-out;}
#tools-menu.open{display:block;}
.mm-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;padding-left:2px;}
.mm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.mm-tile{border-radius:12px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .15s cubic-bezier(.4,0,.2,1);background:#2a2a2e;position:relative;}
.mm-tile:hover{border-color:rgba(255,255,255,.2);transform:scale(1.03);}
.mm-tile.active{border-color:#4CAF50;}
.mm-tile:active{transform:scale(.96);}
.mm-preview{width:100%;height:56px;overflow:hidden;border-radius:8px 8px 0 0;}
.mm-label{font-size:11px;font-weight:500;color:#ccc;padding:5px 6px 6px;text-align:center;letter-spacing:.1px;}
.mm-check{position:absolute;top:5px;right:5px;width:16px;height:16px;border-radius:50%;background:#4CAF50;color:#fff;font-size:9px;font-weight:700;display:none;align-items:center;justify-content:center;line-height:1;}
.mm-tile.active .mm-check{display:flex;}

#shutter-flash{position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;pointer-events:none;opacity:0;z-index:9999;}
#shutter-flash.flash{animation:shutter-flash .35s ease-out forwards;}
#screenshot-toast{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(20,20,20,.9);color:#fff;font-size:12px;font-weight:500;padding:8px 16px;border-radius:20px;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;z-index:200;backdrop-filter:blur(6px);}
#screenshot-toast.show{opacity:1;}
#screenshot-btn.capturing svg{animation:btn-confirm .4s ease-in-out;}
.march{animation:dash-march .9s linear infinite;}
.flow{animation:flow-anim 1.1s linear infinite;}
.fb{animation:fault-blink .7s ease-in-out infinite;}
/* ── BOTTOM NAV BAR ── */
#bottomnav{position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--topbar);border-top:1px solid #3a3a3a;display:flex;align-items:center;justify-content:space-around;z-index:150;padding:0 4px;}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;border-radius:10px;border:none;background:none;cursor:pointer;transition:background .15s;min-width:52px;}
.bnav-btn:hover{background:rgba(255,255,255,.08);}
.bnav-btn.active{background:rgba(55,138,221,.18);}
.bnav-btn svg{width:20px;height:20px;fill:none;stroke:#999;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.bnav-btn.active svg{stroke:#378ADD;}
.bnav-label{font-size:10px;color:#888;font-family:'DM Sans',sans-serif;font-weight:500;}
.bnav-btn.active .bnav-label{color:#378ADD;}
.bnav-badge{position:absolute;top:4px;right:6px;width:16px;height:16px;border-radius:50%;background:#E24B4A;font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;}

/* ── PANEL SHEETS (full-screen overlays) ── */
.feature-panel{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg,#1c1c1e);z-index:200;display:none;flex-direction:column;overflow:hidden;}
.feature-panel.open{display:flex;}
.fp-head{height:52px;background:#2a2a2e;display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.08);}
.fp-title{font-size:16px;font-weight:500;color:#fff;flex:1;}
.fp-close{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.08);border:none;color:#aaa;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.fp-body{flex:1;overflow-y:auto;padding:0;}
.fp-body::-webkit-scrollbar{width:3px;}
.fp-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px;}

/* ── WORK ORDERS ── */
.wo-fab{position:absolute;bottom:70px;right:14px;width:48px;height:48px;border-radius:50%;background:#378ADD;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(55,138,221,.5);z-index:20;}
.wo-fab svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;}
.wo-card{background:#2a2a2e;border-radius:14px;margin:10px 14px;padding:14px;border:1px solid rgba(255,255,255,.08);}
.wo-card:active{opacity:.88;}
.wo-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.wo-id{font-size:11px;font-weight:600;color:#378ADD;font-family:'JetBrains Mono',monospace;}
.wo-status{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:600;}
.st-open{background:rgba(55,138,221,.2);color:#378ADD;}
.st-progress{background:rgba(239,159,39,.2);color:#EF9F27;}
.st-done{background:rgba(61,214,140,.2);color:#3DD68C;}
.st-urgent{background:rgba(226,75,74,.2);color:#E24B4A;}
.wo-title{font-size:14px;font-weight:500;color:#f0f0f0;margin-bottom:4px;}
.wo-meta{font-size:12px;color:#666;margin-bottom:8px;}
.wo-asset-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.06);color:#aaa;border:1px solid rgba(255,255,255,.1);}
.wo-actions{display:flex;gap:6px;margin-top:10px;}
.wo-btn{flex:1;padding:8px;border-radius:10px;border:none;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
.wo-btn-pri{background:#378ADD;color:#fff;}
.wo-btn-sec{background:rgba(255,255,255,.08);color:#aaa;}
.wo-filter-row{display:flex;gap:6px;padding:12px 14px;overflow-x:auto;flex-shrink:0;}
.wo-filter-row::-webkit-scrollbar{display:none;}
.wof{padding:5px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.12);background:none;color:#888;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.wof.on{background:#378ADD;border-color:#378ADD;color:#fff;font-weight:600;}
.new-wo-form{padding:14px;}
.nwf-input{width:100%;background:#2a2a2e;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 12px;font-size:13px;color:#f0f0f0;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:10px;}
.nwf-input:focus{border-color:#378ADD;}
.nwf-label{font-size:11px;color:#666;margin-bottom:4px;display:block;}
.nwf-select{width:100%;background:#2a2a2e;border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:10px 12px;font-size:13px;color:#f0f0f0;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:10px;cursor:pointer;}
.nwf-select option{background:#1c1c1e;}

/* ── CREW TRACKING ── */
.crew-list{padding:10px 14px;}
.crew-card{display:flex;align-items:center;gap:12px;background:#2a2a2e;border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid rgba(255,255,255,.06);}
.crew-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;position:relative;}
.crew-online-dot{position:absolute;bottom:0;right:0;width:11px;height:11px;border-radius:50%;border:2px solid #2a2a2e;}
.crew-dot-online{background:#3DD68C;}
.crew-dot-offline{background:#555;}
.crew-dot-busy{background:#EF9F27;}
.crew-info{flex:1;}
.crew-name{font-size:14px;font-weight:500;color:#f0f0f0;margin-bottom:2px;}
.crew-loc{font-size:11px;color:#666;}
.crew-task{font-size:11px;color:#888;margin-top:2px;}
.crew-dist{font-size:11px;color:#378ADD;font-family:'JetBrains Mono',monospace;text-align:right;}
.crew-map-dot{width:28px;height:28px;border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;position:absolute;}

/* ── PHOTOS ── */
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 14px;}
.photo-card{background:#2a2a2e;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.06);}
.photo-thumb{width:100%;height:110px;object-fit:cover;background:#1a1a1a;display:flex;align-items:center;justify-content:center;}
.photo-thumb svg{width:32px;height:32px;stroke:#444;fill:none;stroke-width:1.5;}
.photo-meta{padding:8px 10px;}
.photo-asset{font-size:11px;font-weight:600;color:#378ADD;font-family:'JetBrains Mono',monospace;}
.photo-note{font-size:12px;color:#aaa;margin-top:2px;line-height:1.4;}
.photo-time{font-size:10px;color:#555;margin-top:4px;font-family:'JetBrains Mono',monospace;}
.photo-add-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:rgba(55,138,221,.08);border:1.5px dashed rgba(55,138,221,.3);border-radius:12px;height:160px;cursor:pointer;margin:0 14px 14px;transition:background .15s;}
.photo-add-btn:hover{background:rgba(55,138,221,.14);}
.photo-add-btn svg{width:28px;height:28px;stroke:#378ADD;fill:none;stroke-width:2;}
.photo-add-btn span{font-size:13px;color:#378ADD;font-weight:500;}

/* ── DAMAGE REPORTS ── */
.dmg-card{background:#2a2a2e;border-radius:14px;margin:10px 14px;padding:14px;border:1px solid rgba(255,255,255,.08);}
.dmg-sev{display:inline-block;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;}
.sev-critical{background:rgba(226,75,74,.2);color:#E24B4A;}
.sev-high{background:rgba(239,159,39,.2);color:#EF9F27;}
.sev-low{background:rgba(61,214,140,.2);color:#3DD68C;}
.dmg-title{font-size:14px;font-weight:500;color:#f0f0f0;margin:6px 0 3px;}
.dmg-desc{font-size:12px;color:#888;line-height:1.5;margin-bottom:8px;}
.dmg-detail-row{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-top:1px solid rgba(255,255,255,.06);}
.dmg-key{color:#555;}
.dmg-val{color:#aaa;font-weight:500;}

/* ── NOTIFICATIONS ── */
.notif-card{display:flex;gap:12px;padding:14px;border-bottom:1px solid rgba(255,255,255,.06);}
.notif-card.unread{background:rgba(55,138,221,.05);}
.notif-icon{width:36px;height:36px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.notif-icon svg{width:18px;height:18px;fill:none;stroke-width:2;stroke-linecap:round;}
.notif-body{flex:1;}
.notif-title{font-size:13px;font-weight:500;color:#f0f0f0;margin-bottom:2px;}
.notif-desc{font-size:12px;color:#777;line-height:1.4;}
.notif-time{font-size:10px;color:#555;margin-top:4px;font-family:'JetBrains Mono',monospace;}
.notif-dot{width:8px;height:8px;border-radius:50%;background:#378ADD;flex-shrink:0;margin-top:6px;}

/* ── ROUTE PLANNING ── */
.route-card{background:#2a2a2e;border-radius:14px;margin:10px 14px;padding:14px;border:1px solid rgba(255,255,255,.08);}
.route-stop{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);}
.route-stop:last-child{border-bottom:none;}
.stop-num{width:26px;height:26px;border-radius:50%;background:#378ADD;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;font-family:'JetBrains Mono',monospace;}
.stop-num.done{background:#3DD68C;}
.stop-num.current{background:#EF9F27;box-shadow:0 0 0 3px rgba(239,159,39,.25);}
.stop-info{flex:1;}
.stop-name{font-size:13px;font-weight:500;color:#f0f0f0;margin-bottom:2px;}
.stop-addr{font-size:11px;color:#666;}
.stop-dist{font-size:11px;color:#378ADD;font-family:'JetBrains Mono',monospace;text-align:right;padding-top:2px;}
.stop-connector{width:2px;height:16px;background:rgba(55,138,221,.3);margin:2px 0 2px 12px;}
.route-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 14px;}
.rs-box{background:#2a2a2e;border-radius:10px;padding:10px;text-align:center;}
.rs-val{font-size:18px;font-weight:600;color:#378ADD;font-family:'JetBrains Mono',monospace;}
.rs-lbl{font-size:10px;color:#555;margin-top:2px;}
.route-nav-btn{margin:0 14px 14px;width:calc(100% - 28px);padding:13px;border-radius:12px;background:#378ADD;border:none;color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* ── OFFLINE BANNER ── */
#offline-bar{position:fixed;top:52px;left:0;right:0;height:28px;background:#EF9F27;display:none;align-items:center;justify-content:center;gap:8px;z-index:180;font-size:12px;font-weight:600;color:#fff;}
#offline-bar.show{display:flex;}
#offline-bar svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;}
.cache-badge{position:absolute;bottom:2px;right:2px;font-size:8px;background:#EF9F27;color:#fff;border-radius:3px;padding:1px 3px;font-weight:700;font-family:'JetBrains Mono',monospace;}

/* ── MAP CREW DOTS ── */
.map-crew{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:25;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:250;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-sheet{background:#1c1c1e;border-radius:22px 22px 0 0;width:100%;max-height:85vh;overflow-y:auto;padding-bottom:24px;}
.modal-handle{width:38px;height:4px;background:#444;border-radius:2px;margin:14px auto 0;}
.modal-title{font-size:17px;font-weight:500;color:#fff;padding:14px 18px 10px;}

<body>
<div id="app">

  <!-- Top bar -->
  <div id="topbar">
    <span class="co">VLTRVIEW</span>
    <button class="ti" id="loc-btn" onclick="toggleLocationTab()" title="Current location">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4" fill="#4CAF50"/><circle cx="12" cy="12" r="7" stroke="#4CAF50" stroke-width="2" fill="none"/><line x1="12" y1="2" x2="12" y2="6" stroke="#4CAF50" stroke-width="2"/><line x1="12" y1="18" x2="12" y2="22" stroke="#4CAF50" stroke-width="2"/><line x1="2" y1="12" x2="6" y2="12" stroke="#4CAF50" stroke-width="2"/><line x1="18" y1="12" x2="22" y2="12" stroke="#4CAF50" stroke-width="2"/></svg>
    </button>
    <button class="ti" onclick="toggleSearch()" title="Search">
      <svg viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
    </button>
    <button class="ti" onclick="toggleLayers()" title="Layers">
      <svg viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 22 8.5 12 15 2 8.5"/><polyline points="2 15.5 12 22 22 15.5"/><polyline points="2 12 12 18.5 22 12"/></svg>
    </button>
    <button class="ti" id="screenshot-btn" onclick="takeScreenshot()" title="Screenshot">
      <svg viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    </button>
    <button class="ti" id="tools-btn" onclick="toggleToolsMenu()" title="Tools">
      <svg viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
    </button>
    <button class="ti" id="mapstyle-btn" onclick="toggleMapMenu()" title="Map style">
      <svg viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="3 6 12 3 21 6 12 9"/>
        <polyline points="3 6 3 18 12 21 21 18 21 6"/>
        <line x1="12" y1="9" x2="12" y2="21"/>
      </svg>
    </button>
  </div>

  <!-- ── Current location tab ── -->
  <div id="loc-tab">
    <div id="loc-tab-handle"></div>
    <div id="loc-tab-inner">
      <div id="loc-header">
        <div id="loc-status-dot"></div>
        <div>
          <div id="loc-title">Current location</div>
          <div id="loc-accuracy">GPS · Accuracy ±4 m</div>
        </div>
        <button id="loc-recenter" onclick="centerGPS()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="4" fill="currentColor"/><circle cx="12" cy="12" r="7" stroke="currentColor" fill="none"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
          Re-center
        </button>
      </div>
      <div id="loc-grid">
        <div class="loc-cell">
          <div class="lc-label">Latitude</div>
          <div class="lc-val" id="lc-lat">35.7320° N</div>
        </div>
        <div class="loc-cell">
          <div class="lc-label">Longitude</div>
          <div class="lc-val" id="lc-lon">78.8560° W</div>
        </div>
        <div class="loc-cell">
          <div class="lc-label">Heading</div>
          <div class="lc-val" id="lc-heading"><span id="lc-compass">→</span> E 90°</div>
        </div>
        <div class="loc-cell">
          <div class="lc-label">Speed</div>
          <div class="lc-val" id="lc-speed">0.0 mph</div>
        </div>
        <div class="loc-cell">
          <div class="lc-label">Altitude</div>
          <div class="lc-val" id="lc-alt">312 ft</div>
        </div>
        <div class="loc-cell">
          <div class="lc-label">Street</div>
          <div class="lc-val" id="lc-street">Hunter Dr</div>
        </div>
      </div>
      <div id="loc-bar">
        <div id="loc-bar-fill"></div>
      </div>
      <div id="loc-bar-label">Stop <span id="lc-stop">1</span> of <span id="lc-total">6</span> along route</div>
    </div>
  </div>

  <!-- ── OFFLINE BAR ── -->
  <div id="offline-bar">
    <svg viewBox="0 0 24 24"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
    Offline — cached tiles active · 14 tiles stored
  </div>

  <!-- ── BOTTOM NAV ── -->
  <div id="bottomnav">
    <button class="bnav-btn active" id="bn-map" onclick="switchTab('map',this)" title="Map">
      <svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
      <span class="bnav-label">Map</span>
    </button>
    <button class="bnav-btn" id="bn-orders" onclick="switchTab('orders',this)" title="Work Orders" style="position:relative">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <span class="bnav-label">Orders</span>
      <div class="bnav-badge">4</div>
    </button>
    <button class="bnav-btn" id="bn-crew" onclick="switchTab('crew',this)" title="Crew">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="bnav-label">Crew</span>
    </button>
    <button class="bnav-btn" id="bn-route" onclick="switchTab('route',this)" title="Route">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span class="bnav-label">Route</span>
    </button>
    <button class="bnav-btn" id="bn-notif" onclick="switchTab('notif',this)" title="Alerts" style="position:relative">
      <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="bnav-label">Alerts</span>
      <div class="bnav-badge">7</div>
    </button>
  </div>

  <!-- ════════════════════════════════
       WORK ORDERS PANEL
  ════════════════════════════════ -->
  <div class="feature-panel" id="panel-orders">
    <div class="fp-head">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#378ADD" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="fp-title">Work orders</span>
      <button class="fp-close" onclick="switchTab('map',document.getElementById('bn-map'))">×</button>
    </div>
    <div class="wo-filter-row">
      <button class="wof on" onclick="filterWO('all',this)">All</button>
      <button class="wof" onclick="filterWO('open',this)">Open</button>
      <button class="wof" onclick="filterWO('progress',this)">In progress</button>
      <button class="wof" onclick="filterWO('urgent',this)">Urgent</button>
      <button class="wof" onclick="filterWO('done',this)">Done</button>
    </div>
    <div class="fp-body" id="wo-list"></div>
    <div style="padding:12px 14px 70px">
      <button onclick="openNewWO()" style="width:100%;padding:13px;border-radius:12px;background:#378ADD;border:none;color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;">+ New work order</button>
    </div>
  </div>

  <!-- ════════════════════════════════
       CREW TRACKING PANEL
  ════════════════════════════════ -->

function updateGPS(){
  const p=route[pos];
  ['cx','cy'].forEach((a,i)=>{
    document.getElementById('gps-dot').setAttribute(a,i?p.y:p.x);
    document.getElementById('gps-acc').setAttribute(a,i?p.y:p.x);
  });
  // heading cone
  const rad=p.heading*Math.PI/180,d=24,w=9;
  const cone=document.getElementById('gps-cone');
  const tx=p.x+d*Math.cos(rad-Math.PI/2),ty=p.y+d*Math.sin(rad-Math.PI/2);
  cone.setAttribute('points',`${tx},${ty} ${p.x+w*Math.cos(rad)},${p.y+w*Math.sin(rad)} ${p.x-w*Math.cos(rad)},${p.y-w*Math.sin(rad)}`);
  // SV cone
  if(svOpen){
    const sv=document.getElementById('sv-cone');const fov=38;
    const fl=p.x+42*Math.cos(rad-Math.PI/2-fov*Math.PI/180),fy_l=p.y+42*Math.sin(rad-Math.PI/2-fov*Math.PI/180);
    const fr=p.x+42*Math.cos(rad-Math.PI/2+fov*Math.PI/180),fy_r=p.y+42*Math.sin(rad-Math.PI/2+fov*Math.PI/180);
    sv.setAttribute('points',`${p.x},${p.y} ${fl},${fy_l} ${fr},${fy_r}`);
    sv.setAttribute('fill-opacity','0.14');sv.setAttribute('stroke-opacity','0.55');
    renderSV();
  }
  // breadcrumb
  if(pos>0){
    const prev=route[pos-1];const bc=document.getElementById('breadcrumbs');

    ln.setAttribute('x1',prev.x);ln.setAttribute('y1',prev.y);ln.setAttribute('x2',p.x);ln.setAttribute('y2',p.y);
    ln.setAttribute('stroke','#4CAF50');ln.setAttribute('stroke-width','2.2');ln.setAttribute('stroke-dasharray','4 3');ln.setAttribute('opacity','.65');
    bc.appendChild(ln);
  }
  const lat=(35.732+pos*0.0008).toFixed(4);

  document.getElementById('sv-addr').textContent=p.addr;

function renderSV(){
  const canvas=document.getElementById('svcanvas');
  const wrap=document.getElementById('svpanel');
  canvas.width=wrap.offsetWidth||800;canvas.height=wrap.offsetHeight||280;
  const W=canvas.width,H=canvas.height,ctx=canvas.getContext('2d');

  // Sky
  const sky=ctx.createLinearGradient(0,0,0,H*.52);
  sky.addColorStop(0,'#5ba3d9');sky.addColorStop(1,'#b8daf0');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H*.52);
  // Clouds
  [[.2,.12],[.6,.08],[.8,.15]].forEach(([xf,yf])=>{
    ctx.fillStyle='rgba(255,255,255,.55)';ctx.beginPath();ctx.ellipse(xf*W,yf*H,W*.07,H*.04,0,0,Math.PI*2);ctx.fill();
  });

  // Ground / road
  const grd=ctx.createLinearGradient(0,H*.52,0,H);
  grd.addColorStop(0,'#4a4a4a');grd.addColorStop(1,'#333');
  ctx.fillStyle=grd;ctx.fillRect(0,H*.52,W,H*.48);

  // Road markings
  ctx.strokeStyle='rgba(255,255,255,.45)';ctx.lineWidth=2.5;ctx.setLineDash([24,18]);
  ctx.beginPath();ctx.moveTo(W/2,H*.52);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);

  // Sidewalks
  ctx.fillStyle='#a09888';ctx.fillRect(0,H*.44,W,H*.09);
  ctx.fillStyle='#8c8070';ctx.fillRect(0,H*.52,W,H*.03);

  // Curb line
  ctx.fillStyle='#7a7060';ctx.fillRect(0,H*.505,W,3);

  // Trees + poles
  [[.06,'pole'],[.94,'pole'],[.18,'tree'],[.82,'tree'],[.38,'tree'],[.62,'tree']].forEach(([xf,type])=>{
    const px=xf*W,py=H*.44;
    if(type==='tree'){ctx.fillStyle='#3a5e35';ctx.beginPath();ctx.arc(px,py-20,18,0,Math.PI*2);ctx.fill();ctx.fillStyle='#2d2d2d';ctx.fillRect(px-3,py-4,6,26);}
    else{ctx.fillStyle='#444';ctx.fillRect(px-2.5,py-72,5,72);ctx.fillStyle='#555';ctx.fillRect(px-22,py-72,44,3.5);}
  });

  // Underground section label
  ctx.fillStyle='rgba(255,255,255,.22)';ctx.font=`bold 11px 'JetBrains Mono',monospace`;ctx.textAlign='left';
  ctx.fillText('UNDERGROUND',10,H*.58);

  // Clear overlays
  const ov=document.getElementById('sv-overlays');ov.innerHTML='';
  const utils=utilsByPos[pos]||{left:[],right:[],road:[]};
  const horizon=H*.52,underground=H-horizon;

  function drawSide(arr,xCenter,sideLabel){
    const spacing=Math.min(44,underground/(arr.length+1));
    arr.forEach((u,i)=>{
      const uy=horizon+(i+1)*spacing;
      // conduit
      ctx.beginPath();ctx.arc(xCenter,uy,7,0,Math.PI*2);ctx.fillStyle=u.color;ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=1.5;ctx.stroke();
      // inner shine
      ctx.beginPath();ctx.arc(xCenter-2,uy-2,3,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.2)';ctx.fill();
      // dashed leader up to label
      ctx.strokeStyle=u.color;ctx.lineWidth=1;ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.moveTo(xCenter,uy-7);ctx.lineTo(xCenter,horizon+6);ctx.stroke();ctx.setLineDash([]);
      // label pill
      const pill=document.createElement('div');pill.className='sv-util-label';
      pill.style.cssText=`left:${xCenter-30}px;top:${uy-15}px;`;
      pill.innerHTML=`<span class="sv-label-pill" style="background:${u.color}">${u.label}</span><span class="sv-depth">${u.depth}</span>`;
      ov.appendChild(pill);
    });
    if(arr.length){
      ctx.fillStyle='rgba(255,255,255,.4)';ctx.font=`bold 9px 'JetBrains Mono',monospace`;ctx.textAlign='center';
      ctx.fillText(sideLabel,xCenter,horizon+10);
    }
  }

  drawSide(utils.left,W*.18,'◀ SOUTH');
  drawSide(utils.right,W*.82,'NORTH ▶');

  // Road center utilities
  utils.road.forEach((u,i)=>{
    const uy=horizon+(i+1)*36,ux=W/2+(i%2?14:-14);
    ctx.beginPath();ctx.arc(ux,uy,6,0,Math.PI*2);ctx.fillStyle=u.color;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1.2;ctx.stroke();
    const pill=document.createElement('div');pill.className='sv-util-label';
    pill.style.cssText=`left:${ux-26}px;top:${uy-13}px;`;
    pill.innerHTML=`<span class="sv-label-pill" style="background:${u.color}">${u.label}</span><span class="sv-depth">${u.depth}</span>`;
    ov.appendChild(pill);
  });

  // Structures
  (structsByPos[pos]||[]).forEach(s=>{
    const sx=s.xf*W;
    if(s.ag){
      const el=document.createElement('div');el.className='sv-struct';
      el.style.cssText=`left:${sx-9}px;top:${Math.round(H*.34)}px;border-radius:${['sl','gp','tx'].some(t=>s.id.startsWith(t))?'50%':'3px'};background:${s.color};color:${s.color==='#00e000'?'#003300':'#fff'};`;
      el.textContent=s.label;ov.appendChild(el);
      ctx.strokeStyle=s.color;ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.moveTo(sx,H*.44);ctx.lineTo(sx,H*.34+18);ctx.stroke();ctx.setLineDash([]);
    } else {
      const uy=horizon+22;
      const el=document.createElement('div');el.className='sv-struct';
      el.style.cssText=`left:${sx-9}px;top:${uy-9}px;background:${s.color};color:${s.color==='#00e000'?'#003300':'#fff'};`;
      el.textContent=s.label;ov.appendChild(el);
    }
  });

  // Side banners
  [['◀ SOUTH SIDE','left:4px'],['NORTH SIDE ▶','right:4px']].forEach(([txt,pos_])=>{
    const el=document.createElement('div');
    el.style.cssText=`position:absolute;${pos_};top:${Math.round(H*.54)}px;font-size:9px;color:rgba(255,255,255,.45);font-family:'JetBrains Mono',monospace;writing-mode:vertical-rl;letter-spacing:1.5px;pointer-events:none;`;
    el.textContent=txt;ov.appendChild(el);
  });
}

function getAllDS(id,v=[]){if(v.includes(id))return v;v.push(id);(assets[id]?.downstream||[]).forEach(d=>getAllDS(d,v));return v;}
function getAllSegs(id,v=[]){if(v.includes(id))return;v.push(id);const a=assets[id];if(!a)return;a.segs.forEach(s=>{if(!v.includes(s))v.push(s);});a.downstream.forEach(d=>getAllSegs(d,v));return v;}

function tapAsset(id,evt){
  evt.stopPropagation();currentAsset=id;
  const a=assets[id];if(!a)return;
  document.getElementById('sh-title').textContent=a.name;
  document.getElementById('sh-sub').textContent=a.rows[0]?.[1]||'';
  const cRow=`<div class="sh-row"><span class="sh-k">Condition</span><span class="sh-v"><span class="cond ${condCls[a.cond]}">${condLabel[a.cond]}</span></span></div>`;
  const ds=getAllDS(id).filter(d=>d!==id);
  const dsHtml=ds.length?`<div class="imp-section"><div class="imp-lbl">Feeds downstream</div>${ds.map(d=>`<div class="imp-item"><div class="imp-dot" style="background:${({TX:'#791F1F',DP:'#185FA5',EJ:'#00e000',TH:'#00e000',SL:'#854F0B',M:'#BA7517',WV:'#378ADD',MH:'#639922',FH:'#993C1D',GP:'#BA7517'})[assets[d]?.type]||'#888'}"></div>${assets[d]?.name} — ${assets[d]?.rows[0]?.[1]||''}</div>`).join('')}</div>`:'';
  document.getElementById('sh-rows').innerHTML=a.rows.map(([k,v])=>`<div class="sh-row"><span class="sh-k">${k}</span><span class="sh-v">${v}</span></div>`).join('')+cRow+dsHtml;
  const faultable=['TX','DP','EJ','SL'].includes(a.type);
  document.getElementById('sh-actions').innerHTML=
    (faultable&&faultAsset!==id?`<button class="sh-btn red" onclick="triggerFault('${id}')">Simulate fault</button>`:'')
    +(faultAsset?`<button class="sh-btn blu" onclick="clearFault()">Clear fault</button>`:'')
    +`<button class="sh-btn pri" onclick="closeSheet()">Close</button>`;
  const el=document.getElementById('node-'+id);
  if(el){const t=el.getAttribute('transform');if(t){const m=t.match(/translate\(([^,]+),([^)]+)\)/);if(m){const s=document.getElementById('sel');s.setAttribute('cx',m[1]);s.setAttribute('cy',m[2]);s.setAttribute('visibility','visible');}}}
  document.getElementById('sheet').classList.add('open');
}

function triggerFault(id){
  faultAsset=id;const a=assets[id];
  const affected=getAllDS(id).filter(d=>d!==id);const segs=[];getAllSegs(id,segs);
  document.querySelectorAll('.asset').forEach(el=>{const aid=el.dataset?.id||el.id?.replace('node-','');el.style.opacity=(affected.includes(aid)||aid===id)?'0.25':'1';});
  segs.filter(s=>s.startsWith('s-')).forEach(sid=>{const el=document.getElementById(sid);if(!el)return;el.setAttribute('stroke','#999');el.setAttribute('marker-end','url(#arr-off)');el.classList.remove('flow');el.setAttribute('stroke-dasharray','4 4');});
  const el=document.getElementById('node-'+id);if(el){const t=el.getAttribute('transform');const fm=document.getElementById('fault-marker');if(t){const m=t.match(/translate\(([^,]+),([^)]+)\)/);if(m){fm.setAttribute('transform',`translate(${m[1]},${m[2]})`);fm.setAttribute('visibility','visible');}}}
  document.getElementById('faultbar').style.display='flex';
  document.getElementById('fault-txt').textContent=`Fault: ${a.rows[0]?.[1]||id} — ${affected.length} asset${affected.length!==1?'s':''} offline`;
  tapAsset(id,{stopPropagation:()=>{}});
}

function clearFault(){
  faultAsset=null;document.querySelectorAll('.asset').forEach(el=>el.style.opacity='1');
  const primaries=['s-c01-w','s-c01-m','s-c01-e','s-c02-n','s-c02-s','s-c03-n','s-c03-s'];

  primaries.forEach(s=>{const el=document.getElementById(s);if(!el)return;el.setAttribute('stroke','#E24B4A');el.setAttribute('marker-end','url(#arr-on)');el.classList.add('flow');el.setAttribute('stroke-dasharray','10 5');});

  const svg=document.getElementById('mapsvg');

  svg.querySelector('rect:first-child').setAttribute('fill',s.bg);

  // Parcel polygons (first 5 polygon elements)
  svg.querySelectorAll('polygon').forEach((el,i)=>{
    if(i<5){el.setAttribute('fill',s.parcel);el.setAttribute('stroke',s.parcelStroke);}

async function doSearch(){
  const q=document.getElementById('search-input').value.trim();
  if(!q)return;
  const res=document.getElementById('search-results');
  res.innerHTML=`<div style="padding:14px 16px;color:#888;font-size:13px">Searching...</div>`;
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=6&addressdetails=1`,{headers:{'Accept-Language':'en'}});
    const data=await r.json();
    if(!data.length){res.innerHTML=`<div style="padding:14px 16px;color:#888;font-size:13px">No results found for "${q}"</div>`;return;}
    res.innerHTML=data.map((item,i)=>{
      const parts=item.display_name.split(', ');
      const main=parts.slice(0,2).join(', ');
      const sub=parts.slice(2,5).join(', ');
      return `<div class="sr-item" onclick="selectResult(${item.lat},${item.lon},'${main.replace(/'/g,"\\'")}')">
        <div class="sr-main">${main}</div>
        <div class="sr-sub">${sub}</div>
      </div>`;
    }).join('');
  }catch(e){
    res.innerHTML=`<div style="padding:14px 16px;color:#888;font-size:13px">Search unavailable — check connection</div>`;
  }
}

function selectResult(lat,lon,label){
  const pin=document.getElementById('search-pin');
  // Map our SVG (800x500) roughly to real-world coords around Apex NC area
  // Center: 35.732°N, 78.856°W → SVG 400,260
  const svgX=Math.max(30,Math.min(770, 400+(lon+78.856)*2600));
  const svgY=Math.max(30,Math.min(470, 260-(lat-35.732)*2600));
  pin.setAttribute('transform',`translate(${svgX},${svgY})`);
  pin.setAttribute('visibility','visible');
  // Update label
  const lbl=document.getElementById('search-pin-label');
  if(lbl)lbl.textContent=label.length>22?label.slice(0,20)+'…':label;
  // Update location tab if open
  if(locTabOpen){
    document.getElementById('lc-lat').textContent=parseFloat(lat).toFixed(4)+'° N';
    document.getElementById('lc-lon').textContent=parseFloat(lon).toFixed(4)+'° W';
  }
  // Close search
  toggleSearch();
}

let measurePts=[];
let measureUnit='ft';

function enterMeasureMode(){
  measurePts=[];
  document.getElementById('mapwrap').style.cursor='crosshair';
  document.getElementById('mapwrap').addEventListener('click',onMeasureClick);
  document.getElementById('measure-result').style.display='none';
  document.getElementById('measure-instructions').style.display='block';
}

function onMeasureClick(e){
  if(e.target.closest('.tool-panel')||e.target.closest('#tools-menu'))return;
  const svg=document.getElementById('mapsvg');
  const rect=svg.getBoundingClientRect();
  const vb=svg.viewBox.baseVal;
  const sx=(e.clientX-rect.left)/rect.width*vb.width;
  const sy=(e.clientY-rect.top)/rect.height*vb.height;
  measurePts.push({x:sx,y:sy});
  if(measurePts.length===1){
    const da=document.getElementById('measure-dot-a');
    da.setAttribute('cx',sx);da.setAttribute('cy',sy);da.setAttribute('visibility','visible');
    document.getElementById('mpt-a').textContent=`${sx.toFixed(0)}, ${sy.toFixed(0)}`;
  }
  if(measurePts.length>=2){
    measurePts=[measurePts[0],{x:sx,y:sy}];
    const [a,b]=measurePts;
    const db=document.getElementById('measure-dot-b');
    db.setAttribute('cx',b.x);db.setAttribute('cy',b.y);db.setAttribute('visibility','visible');
    const ml=document.getElementById('measure-line');
    ml.setAttribute('x1',a.x);ml.setAttribute('y1',a.y);ml.setAttribute('x2',b.x);ml.setAttribute('y2',b.y);ml.setAttribute('visibility','visible');
    // SVG units → real distance (each SVG unit ≈ 0.25ft at street level for this prototype)
    const px=Math.sqrt((b.x-a.x)**2+(b.y-a.y)**2);
    const ft=px*0.9;
    const lbl=document.getElementById('measure-label');
    lbl.setAttribute('x',(a.x+b.x)/2);lbl.setAttribute('y',(a.y+b.y)/2-10);lbl.setAttribute('visibility','visible');
    showMeasureResult(ft);
    document.getElementById('mpt-b').textContent=`${b.x.toFixed(0)}, ${b.y.toFixed(0)}`;
  }
}

function showMeasureResult(ft){
  document.getElementById('measure-instructions').style.display='none';
  document.getElementById('measure-result').style.display='block';
  _measuredFt=ft;
  updateMeasureDisplay();
}

let _measuredFt=0;
function setMeasureUnit(u,btn){
  measureUnit=u;
  document.querySelectorAll('.mu-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  updateMeasureDisplay();
}
function updateMeasureDisplay(){
  let val,label;
  if(measureUnit==='ft'){val=_measuredFt.toFixed(1);label=val+' ft';}
  else if(measureUnit==='m'){val=(_measuredFt*0.3048).toFixed(1);label=val+' m';}
  else{val=(_measuredFt/5280).toFixed(3);label=val+' mi';}
  document.getElementById('measure-dist').textContent=label;
  const lbl=document.getElementById('measure-label');
  lbl.textContent=measureUnit==='ft'?Math.round(_measuredFt)+'ft':measureUnit==='m'?Math.round(_measuredFt*0.3048)+'m':(_measuredFt/5280).toFixed(2)+'mi';
}

function clearMeasure(){

  ['measure-dot-a','measure-dot-b','measure-line','measure-label'].forEach(id=>{
    document.getElementById(id)?.setAttribute('visibility','hidden');

// ── DRAW ──
let drawTool='pen';
let drawColor='#ff4444';
let isDrawing=false;
let currentPath=null;
let drawHistory=[];
let drawStartPt=null;

function enterDrawMode(){
  document.getElementById('mapwrap').style.cursor='crosshair';
  const mw=document.getElementById('mapwrap');
  mw.addEventListener('mousedown',onDrawStart);
  mw.addEventListener('mousemove',onDrawMove);
  mw.addEventListener('mouseup',onDrawEnd);
  mw.addEventListener('touchstart',onDrawStart,{passive:true});
  mw.addEventListener('touchmove',onDrawMove,{passive:true});
  mw.addEventListener('touchend',onDrawEnd);
  document.getElementById('draw-hint').textContent=drawTool==='pen'?'Draw freehand on the map':drawTool==='line'?'Click and drag to draw a line':drawTool==='circle'?'Click and drag to draw a circle':'Click on the map to add a note';
}

function exitDrawMode(){
  const mw=document.getElementById('mapwrap');
  mw.removeEventListener('mousedown',onDrawStart);
  mw.removeEventListener('mousemove',onDrawMove);
  mw.removeEventListener('mouseup',onDrawEnd);
  mw.removeEventListener('touchstart',onDrawStart);
  mw.removeEventListener('touchmove',onDrawMove);
  mw.removeEventListener('touchend',onDrawEnd);
  document.getElementById('mapwrap').style.cursor='crosshair';
  isDrawing=false;currentPath=null;
}

function getSVGPt(e){
  const svg=document.getElementById('mapsvg');
  const rect=svg.getBoundingClientRect();
  const vb=svg.viewBox.baseVal;
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  return{x:(cx-rect.left)/rect.width*vb.width,y:(cy-rect.top)/rect.height*vb.height};
}

function onDrawStart(e){
  if(activeTool!=='draw')return;
  if(e.target.closest('.tool-panel')||e.target.closest('#tools-menu'))return;
  isDrawing=true;
  const pt=getSVGPt(e);
  drawStartPt=pt;
  const ns='http://www.w3.org/2000/svg';
  if(drawTool==='pen'){
    currentPath=document.createElementNS(ns,'path');
    currentPath.setAttribute('fill','none');
    currentPath.setAttribute('stroke',drawColor);
    currentPath.setAttribute('stroke-width','2.5');
    currentPath.setAttribute('stroke-linecap','round');
    currentPath.setAttribute('stroke-linejoin','round');
    currentPath.setAttribute('d',`M${pt.x},${pt.y}`);
    document.getElementById('draw-layer').appendChild(currentPath);
  } else if(drawTool==='line'){
    currentPath=document.createElementNS(ns,'line');
    currentPath.setAttribute('x1',pt.x);currentPath.setAttribute('y1',pt.y);
    currentPath.setAttribute('x2',pt.x);currentPath.setAttribute('y2',pt.y);
    currentPath.setAttribute('stroke',drawColor);currentPath.setAttribute('stroke-width','2.5');
    currentPath.setAttribute('stroke-linecap','round');
    document.getElementById('draw-layer').appendChild(currentPath);
  } else if(drawTool==='circle'){
    currentPath=document.createElementNS(ns,'circle');
    currentPath.setAttribute('cx',pt.x);currentPath.setAttribute('cy',pt.y);
    currentPath.setAttribute('r','0');currentPath.setAttribute('fill','none');
    currentPath.setAttribute('stroke',drawColor);currentPath.setAttribute('stroke-width','2.5');
    document.getElementById('draw-layer').appendChild(currentPath);
  } else if(drawTool==='text'){
    const txt=prompt('Enter note text:');
    if(txt){
      const t=document.createElementNS(ns,'text');
      t.setAttribute('x',pt.x);t.setAttribute('y',pt.y);
      t.setAttribute('fill',drawColor);t.setAttribute('font-size','13');
      t.setAttribute('font-weight','600');t.setAttribute('font-family',"'DM Sans',sans-serif");
      t.setAttribute('paint-order','stroke');t.setAttribute('stroke','rgba(0,0,0,.6)');t.setAttribute('stroke-width','3');
      t.textContent=txt;
      document.getElementById('draw-layer').appendChild(t);
      drawHistory.push(t);
    }
    isDrawing=false;
  }
}

function onDrawMove(e){
  if(!isDrawing||!currentPath)return;
  const pt=getSVGPt(e);
  if(drawTool==='pen'){
    currentPath.setAttribute('d',currentPath.getAttribute('d')+` L${pt.x},${pt.y}`);
  } else if(drawTool==='line'){
    currentPath.setAttribute('x2',pt.x);currentPath.setAttribute('y2',pt.y);
  } else if(drawTool==='circle'){
    const dx=pt.x-drawStartPt.x,dy=pt.y-drawStartPt.y;
    currentPath.setAttribute('r',Math.sqrt(dx*dx+dy*dy).toFixed(1));
  }
}

function onDrawEnd(){
  if(currentPath)drawHistory.push(currentPath);
  isDrawing=false;currentPath=null;
}

function setDrawTool(tool,btn){
  drawTool=tool;
  document.querySelectorAll('.dt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const hints={pen:'Draw freehand on the map',line:'Click and drag to draw a line',circle:'Click and drag to draw a circle',text:'Click the map to add a text note'};
  document.getElementById('draw-hint').textContent=hints[tool];
}

function setDrawColor(color,dot){
  drawColor=color;
  document.querySelectorAll('.dc-dot').forEach(d=>d.classList.remove('active'));
  dot.classList.add('active');
}

function undoDrawing(){
  const last=drawHistory.pop();
  if(last)last.remove();
}

function clearDrawing(){
  document.getElementById('draw-layer').innerHTML='';
  drawHistory=[];
}

const typeColors={TX:'#791F1F',DP:'#185FA5',EJ:'#00e000',TH:'#00e000',SL:'#854F0B',M:'#BA7517',WV:'#378ADD',MH:'#639922',FH:'#993C1D',GP:'#BA7517'};
const condBg={good:'rgba(39,160,69,.15)',fair:'rgba(230,126,0,.15)',poor:'rgba(192,57,43,.15)',unknown:'rgba(24,95,165,.15)'};
const condTxt={good:'#27A045',fair:'#E67E00',poor:'#C0392B',unknown:'#185FA5'};

function doUtilitySearch(q){
  const res=document.getElementById('usearch-results');
  const query=(q||'').toLowerCase().trim();
  const matches=Object.entries(assets).filter(([id,a])=>{
    const typeMatch=utilFilter==='all'||a.type===utilFilter;
    if(!typeMatch)return false;
    if(!query)return true;
    const searchable=[id,a.name,a.type,...a.rows.map(r=>r[1])].join(' ').toLowerCase();
    return searchable.includes(query);
  });
  if(!matches.length){res.innerHTML=`<div style="padding:10px 0;font-size:12px;color:#555;text-align:center">No results</div>`;return;}
  res.innerHTML=matches.slice(0,12).map(([id,a])=>`
    <div class="ur-item" onclick="highlightAsset('${id}')">
      <div class="ur-dot" style="background:${typeColors[a.type]||'#888'}"></div>
      <div style="flex:1">
        <div class="ur-name">${a.name}</div>
        <div class="ur-id">${a.rows[0]?.[1]||id}</div>
      </div>
      <span class="ur-cond" style="background:${condBg[a.cond]};color:${condTxt[a.cond]}">${a.cond}</span>
    </div>`).join('');
}

function highlightAsset(id){
  const el=document.getElementById('node-'+id);
  if(!el)return;
  const t=el.getAttribute('transform');
  if(t){
    const m=t.match(/translate\(([^,]+),([^)]+)\)/);
    if(m){
      const s=document.getElementById('sel');
      s.setAttribute('cx',m[1]);s.setAttribute('cy',m[2]);s.setAttribute('visibility','visible');
      // flash
      let count=0;const flash=setInterval(()=>{
        s.setAttribute('visibility',count%2?'visible':'hidden');
        if(++count>6){clearInterval(flash);s.setAttribute('visibility','visible');}
      },200);
    }
  }
  // also open detail sheet
  tapAsset(id,{stopPropagation:()=>{}});
}

async function takeScreenshot(){
  const btn=document.getElementById('screenshot-btn');
  btn.classList.add('capturing');

  // Flash effect
  let flash=document.getElementById('shutter-flash');
  if(!flash){flash=document.createElement('div');flash.id='shutter-flash';document.body.appendChild(flash);}
  flash.classList.remove('flash');
  void flash.offsetWidth;
  flash.classList.add('flash');

  // Try html2canvas if available, otherwise fall back to browser screenshot hint
  try{
    if(typeof html2canvas!=='undefined'){
      const canvas=await html2canvas(document.getElementById('app'),{
        backgroundColor:'#000',
        scale:window.devicePixelRatio||2,
        useCORS:true,
        allowTaint:true,
        logging:false
      });
      const link=document.createElement('a');
      const ts=new Date().toISOString().slice(0,19).replace(/[T:]/g,'-');
      link.download=`vltrview-${ts}.png`;
      link.href=canvas.toDataURL('image/png');
      link.click();
      showToast('Screenshot saved');
    } else {
      // Load html2canvas dynamically
      const script=document.createElement('script');
      script.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      script.onload=async()=>{
        const canvas=await html2canvas(document.getElementById('app'),{
          backgroundColor:'#000',
          scale:window.devicePixelRatio||2,
          useCORS:true,
          allowTaint:true,
          logging:false
        });
        const link=document.createElement('a');
        const ts=new Date().toISOString().slice(0,19).replace(/[T:]/g,'-');
        link.download=`vltrview-${ts}.png`;
        link.href=canvas.toDataURL('image/png');
        link.click();
        showToast('Screenshot saved');
      };
      script.onerror=()=>showToast('Use Ctrl+Shift+S / Cmd+Shift+4 to screenshot');
      document.head.appendChild(script);
    }
  }catch(e){
    showToast('Use Ctrl+Shift+S to screenshot');
  }

  setTimeout(()=>btn.classList.remove('capturing'),500);
}

function showToast(msg){
  let toast=document.getElementById('screenshot-toast');
  if(!toast){
    toast=document.createElement('div');
    toast.id='screenshot-toast';
    document.getElementById('mapwrap').appendChild(toast);
  }
  toast.textContent=msg;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>toast.classList.remove('show'),2400);
}

      <div class="stop-info">
        <div class="stop-name" style="color:${s.status==='done'?'#555':s.status==='current'?'#EF9F27':'#f0f0f0'}">${s.name}</div>
        <div class="stop-addr">${s.addr}</div>
      </div>
      <div class="stop-dist" style="color:${s.status==='current'?'#EF9F27':'#378ADD'}">${s.dist}</div>
    </div>`).join('')+'</div>';
  const done=routeStops.filter(s=>s.status==='done').length;
  document.getElementById('rt-done-count').textContent=done;
}

function advanceRoute(){
  const cur=routeStops.findIndex(s=>s.status==='current');
  if(cur>=0){
    routeStops[cur].status='done';
    if(cur+1<routeStops.length){routeStops[cur+1].status='current';showToast('Navigating to '+routeStops[cur+1].name);}
    else{showToast('Route complete! All stops done.');}
    renderRoute();
  }
}
